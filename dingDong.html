<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ding Dong Dederó</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/abcjs/6.2.2/abcjs-basic-min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0f;
    color: #c8b88a;
    font-family: Georgia, serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 2rem 1rem;
    gap: 1.5rem;
  }
  h1 { font-size: 1.6rem; color: #d4af37; letter-spacing: 0.08em; }
  h2 { font-size: 0.9rem; color: #888; font-weight: normal; letter-spacing: 0.12em; }

  #notation {
    background: #f8f4ec;
    border-radius: 8px;
    padding: 1rem;
    width: 100%;
    max-width: 700px;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    justify-content: center;
    width: 100%;
    max-width: 700px;
  }

  button {
    background: #1a1a2e;
    border: 1px solid #d4af37;
    color: #d4af37;
    padding: 0.6rem 1.4rem;
    border-radius: 4px;
    cursor: pointer;
    font-size: 1rem;
    font-family: Georgia, serif;
    letter-spacing: 0.05em;
    transition: background 0.2s;
  }
  button:hover { background: #2a2a3e; }
  button:disabled { opacity: 0.4; cursor: default; }
  button.active { background: #2a3a1e; border-color: #8abd56; color: #8abd56; }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    width: 100%;
    max-width: 700px;
  }
  label { font-size: 0.85rem; color: #888; min-width: 80px; }
  input[type=range] { flex: 1; accent-color: #d4af37; }
  .val { font-size: 0.85rem; color: #c8b88a; min-width: 40px; text-align: right; }

  .track-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
    width: 100%;
    max-width: 700px;
  }
  .track-btn {
    font-size: 0.8rem;
    padding: 0.4rem 0.8rem;
    border-color: #555;
    color: #aaa;
  }
  .track-btn.on { border-color: #d4af37; color: #d4af37; }

  #status {
    font-size: 0.8rem;
    color: #666;
    min-height: 1.2rem;
    text-align: center;
  }

  .version-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
    width: 100%;
    max-width: 700px;
  }
  .ver-btn { font-size: 0.8rem; padding: 0.4rem 0.9rem; border-color: #444; color: #999; }
  .ver-btn.selected { border-color: #d4af37; color: #d4af37; background: #1a1810; }
</style>
</head>
<body>

<h1>Ding Dong Dederó</h1>
<h2>Buail Seo · Séid Seo · The Smith's Song</h2>

<div id="notation"></div>
<div id="status">Tap Play to begin</div>

<div class="controls">
  <button id="btnPlay">▶ Play</button>
  <button id="btnStop" disabled>■ Stop</button>
</div>

<div class="slider-row">
  <label>Tempo</label>
  <input type="range" id="tempoSlider" min="600" max="3000" value="1400" step="100">
  <span class="val" id="tempoVal">1400ms</span>
</div>

<div class="version-row" id="versionRow"></div>
<div class="track-buttons" id="trackButtons"></div>

<script>
// ── Tune versions ─────────────────────────────────────────────────────────────
const TUNES = {

  'Plain (D major)': `X:1
T:Ding Dong Dederó
M:4/4
L:1/8
K:Dmaj
d2 A2 BG G2|A2 A2 c2 d2|d2 A2 BG AF|G2 F2 G2 A2|
d2 A2 BG G2|A2 A2 c2 d2|dd A2 BG AF|G2 F2 G4|
A2 A2 B2 AG|A2 A2 f2 ef|g2 f2 e2 dc|A2 A2 c2 d2|
A2 A2 B2 AG|A2 A2 f2 ef|g2 f2 e2 dc|A2 A2 c2 de|
d2 A2 BG G2|A2 A2 c2 d2|d2 A2 BG AF|G2 F2 G2 A2|
d2 A2 BG G2|A2 A2 c2 d2|dd A2 BG AF|G2 F2 G4|`,

  'D Dorian': `X:1
T:Ding Dong Dederó (Dorian)
M:4/4
L:1/8
K:Ddor
d2 A2 BG G2|A2 A2 c2 d2|d2 A2 BG AF|G2 F2 G2 A2|
d2 A2 BG G2|A2 A2 c2 d2|dd A2 BG AF|G2 F2 G4|
A2 A2 B2 AG|A2 A2 f2 ef|g2 f2 e2 dc|A2 A2 c2 d2|
A2 A2 B2 AG|A2 A2 f2 ef|g2 f2 e2 dc|A2 A2 c2 de|
d2 A2 BG G2|A2 A2 c2 d2|d2 A2 BG AF|G2 F2 G2 A2|
d2 A2 BG G2|A2 A2 c2 d2|dd A2 BG AF|G2 F2 G4|`,

  'With Drone': `X:1
T:Ding Dong Dederó (Drone)
M:4/4
L:1/8
K:Ddor
[D,A,]2 d2 A2 BG G2|[D,A,]2 A2 c2 d2|d2 A2 BG AF|[D,A,]2 F2 G2 A2|
[D,A,]2 d2 A2 BG G2|[D,A,]2 A2 c2 d2|dd A2 BG AF|[D,A,]2 F2 G4|
[D,A,]2 A2 B2 AG|A2 A2 f2 ef|g2 f2 e2 dc|[D,A,]2 A2 c2 d2|
[D,A,]2 A2 B2 AG|A2 A2 f2 ef|g2 f2 e2 dc|[D,A,]2 A2 c2 de|
[D,A,]2 d2 A2 BG G2|[D,A,]2 A2 c2 d2|d2 A2 BG AF|[D,A,]2 F2 G2 A2|
[D,A,]2 d2 A2 BG G2|[D,A,]2 A2 c2 d2|dd A2 BG AF|[D,A,]2 F2 G4|`,

  'Ornamented': `X:1
T:Ding Dong Dederó (Ornamented)
M:4/4
L:1/8
K:Ddor
[D,A,]2 {e}d2 A2 BG G2|[D,A,]2 A2 c2 {B}d2|{e}d2 A2 BG AF|[D,A,]2 F2 G2 {A}A2|
[D,A,]2 {e}d2 A2 BG G2|[D,A,]2 A2 c2 {B}d2|{e}d2 A2 BG AF|[D,A,]2 F2 G4|
[D,A,]2 {B}A2 A2 B2 AG|A2 A2 f2 {g}ef|g2 f2 e2 {e}dc|[D,A,]2 A2 c2 d2|
[D,A,]2 {B}A2 A2 B2 AG|A2 A2 f2 {g}ef|g2 f2 e2 dc|[D,A,]2 A2 c2 de|
[D,A,]2 {e}d2 A2 BG G2|[D,A,]2 A2 c2 {B}d2|{e}d2 A2 BG AF|[D,A,]2 F2 G2 {A}A2|
[D,A,]2 {e}d2 A2 BG G2|[D,A,]2 A2 c2 {B}d2|{e}d2 A2 BG AF|[D,,D,A,D]8|`,

};

// ── Instrument presets ────────────────────────────────────────────────────────
const PRESETS = {
  'Steel Drums':    [114],
  'Steel + Banjo':  [114, 105],
  'Steel + Voices': [114, 53],
  'Full':           [114, 105, 53, 92],
  'Harp':           [46],
  'Harp + Piano':   [46, 0],
};

const PATCH_NAMES = {
  0: 'Piano', 46: 'Harp', 53: 'Voice Oohs',
  70: 'Bassoon', 92: 'Pad Bowed', 105: 'Banjo', 114: 'Steel Drums',
};

// ── State ─────────────────────────────────────────────────────────────────────
let synthTracks  = [];
let audioCtx     = null;
let isPlaying    = false;
let loopTimer    = null;
let currentTune  = Object.keys(TUNES)[0];
let currentPatch = [114, 105, 53, 92];
let tempoMs      = 1400;

const soundFontUrls = [
  'https://gleitz.github.io/midi-js-soundfonts/MusyngKite/',
  'https://paulrosen.github.io/midi-js-soundfonts/FluidR3_GM/',
];

// ── UI ────────────────────────────────────────────────────────────────────────
function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

// Version buttons
const versionRow = document.getElementById('versionRow');
Object.keys(TUNES).forEach(name => {
  const btn = document.createElement('button');
  btn.className = 'ver-btn' + (name === currentTune ? ' selected' : '');
  btn.textContent = name;
  btn.onclick = async () => {
    currentTune = name;
    document.querySelectorAll('.ver-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    renderNotation();
    if (isPlaying) { await stopAll(); await startAll(); }
  };
  versionRow.appendChild(btn);
});

// Track buttons
const trackDiv = document.getElementById('trackButtons');
function renderTrackButtons() {
  trackDiv.innerHTML = '';
  synthTracks.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'track-btn' + (t.active ? ' on' : '');
    btn.textContent = t.name;
    btn.onclick = () => toggleTrack(i, btn);
    trackDiv.appendChild(btn);
  });
}

// Tempo slider
const tempoSlider = document.getElementById('tempoSlider');
const tempoValEl  = document.getElementById('tempoVal');
tempoSlider.oninput = () => {
  tempoMs = parseInt(tempoSlider.value);
  tempoValEl.textContent = tempoMs + 'ms';
};

// Play/stop
document.getElementById('btnPlay').onclick = async () => {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') await audioCtx.resume();
  await startAll();
};
document.getElementById('btnStop').onclick = stopAll;

// ── Notation ──────────────────────────────────────────────────────────────────
function renderNotation() {
  ABCJS.renderAbc('notation', TUNES[currentTune], {
    responsive: 'resize',
    staffwidth: 650,
  });
}
renderNotation();

// ── Audio ─────────────────────────────────────────────────────────────────────
function injectPatch(abc, patch) {
  const lines = abc.split('\n');
  const out = [];
  let done = false;
  for (const line of lines) {
    if (!done && line.startsWith('K:')) {
      out.push(`%%MIDI program ${patch}`);
      done = true;
    }
    out.push(line);
  }
  return out.join('\n');
}

async function startAll() {
  await stopAll();
  setStatus('Loading...');
  document.getElementById('btnPlay').disabled = true;

  const abc = TUNES[currentTune];
  synthTracks = [];

  const masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.85;
  masterGain.connect(audioCtx.destination);

  // Build reverb
  const reverbLen = Math.floor(audioCtx.sampleRate * 1.8);
  const impulse   = audioCtx.createBuffer(2, reverbLen, audioCtx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = impulse.getChannelData(ch);
    for (let i = 0; i < reverbLen; i++)
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / reverbLen, 2.5);
  }
  const convolver = audioCtx.createConvolver();
  convolver.buffer = impulse;
  const wet = audioCtx.createGain();
  wet.gain.value = 0.22;
  convolver.connect(wet);
  wet.connect(masterGain);

  const promises = currentPatch.map(async (patchId, idx) => {
    const panned = audioCtx.createGain();
    const pan    = audioCtx.createStereoPanner();
    const pans   = [-0.1, -0.25, 0.2, -0.4, 0.4];
    const vols   = [0.85, 0.75, 0.65, 0.5, 0.6];
    pan.pan.value      = pans[idx] ?? 0;
    panned.gain.value  = vols[idx] ?? 0.7;
    panned.connect(pan);
    pan.connect(masterGain);
    panned.connect(convolver);

    const patchedAbc = injectPatch(abc, patchId);
    const visualObj  = ABCJS.parseOnly(patchedAbc)[0];

    let synth;
    let ok = false;
    for (const url of soundFontUrls) {
      try {
        synth = new ABCJS.synth.CreateSynth();
        await synth.init({
          audioContext: audioCtx,
          visualObj,
          millisecondsPerMeasure: tempoMs,
          options: { soundFontUrl: url, program: patchId },
        });
        ok = true;
        break;
      } catch(e) {
        console.warn(`patch ${patchId} failed on ${url}:`, e.message);
      }
    }
    if (!ok) { console.error('Could not load patch', patchId); return null; }

    return {
      name:   PATCH_NAMES[patchId] || String(patchId),
      synth,
      gain:   panned,
      active: true,
      duration: 0,
    };
  });

  const results = await Promise.all(promises);
  synthTracks = results.filter(Boolean);

  if (synthTracks.length === 0) {
    setStatus('Failed to load any instruments');
    document.getElementById('btnPlay').disabled = false;
    return;
  }

  isPlaying = true;
  document.getElementById('btnPlay').disabled = true;
  document.getElementById('btnStop').disabled = false;

  await playOnce();
  renderTrackButtons();
}

async function playOnce() {
  if (!isPlaying) return;
  setStatus('Priming...');

  for (const t of synthTracks) {
    try { await t.synth.prime(); } catch(e) { console.warn('prime failed', e); }
    if (t.synth.duration && !t.duration) t.duration = t.synth.duration;
  }

  setStatus('Playing ♪');

  const startPromises = synthTracks.map(async t => {
    try { await t.synth.start(); } catch(e) { console.warn('start failed', e); return; }
    if (t.synth.audioBufferPlayer) {
      try { t.synth.audioBufferPlayer.disconnect(); } catch(e) {}
      t.synth.audioBufferPlayer.connect(t.gain);
    }
    if (t.synth.directSource) {
      t.synth.directSource.forEach(s => {
        try { s.disconnect(); } catch(e) {}
        s.connect(t.gain);
      });
    }
  });
  await Promise.all(startPromises);

  // Loop
  const dur = synthTracks[0]?.duration || 30;
  loopTimer = setTimeout(async () => {
    if (!isPlaying) return;
    try {
      for (const t of synthTracks) await t.synth.prime();
      await Promise.all(synthTracks.map(t => t.synth.start()));
      synthTracks.forEach(t => {
        if (t.synth.audioBufferPlayer) {
          try { t.synth.audioBufferPlayer.disconnect(); } catch(e) {}
          t.synth.audioBufferPlayer.connect(t.gain);
        }
      });
    } catch(e) { console.warn('loop failed', e); }
    loopTimer = setTimeout(arguments.callee, (dur * 1000) - 50);
  }, (dur * 1000) - 50);
}

async function stopAll() {
  isPlaying = false;
  if (loopTimer) { clearTimeout(loopTimer); loopTimer = null; }
  for (const t of synthTracks) {
    try { await t.synth.stop(); } catch(e) {}
  }
  synthTracks = [];
  document.getElementById('btnPlay').disabled  = false;
  document.getElementById('btnStop').disabled  = true;
  document.getElementById('trackButtons').innerHTML = '';
  setStatus('Stopped');
}

function toggleTrack(idx, btn) {
  const t = synthTracks[idx];
  if (!t) return;
  t.active = !t.active;
  const target = t.active ? 0.75 : 0.0001;
  const now = audioCtx.currentTime;
  t.gain.gain.cancelScheduledValues(now);
  t.gain.gain.setValueAtTime(t.gain.gain.value, now);
  t.gain.gain.exponentialRampToValueAtTime(target, now + 0.4);
  btn.classList.toggle('on', t.active);
}
</script>
</body>
</html>
