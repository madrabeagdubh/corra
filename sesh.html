<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spooky Tunes Debugger</title>
    <script src="https://cdn.jsdelivr.net/npm/abcjs@6.2.2/dist/abcjs-basic-min.js"></script>
    
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --accent: #7b1fa2;
            --text: #ffffff;
            --off: #333333;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 { margin: 0 0 4px 0; font-size: 1.5rem; color: var(--accent); }
        #tune-index { font-size: 0.75rem; color: #666; margin-bottom: 6px; }
        #tune-title { margin-bottom: 20px; font-weight: 300; min-height: 1.2em; font-size: 1rem; }

        button {
            -webkit-appearance: none;
            border: none;
            border-radius: 12px;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            background: var(--off);
            transition: all 0.2s ease;
            touch-action: manipulation;
            cursor: pointer;
        }

        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        .main-actions {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            border-top: 1px solid #444;
            padding-top: 20px;
        }

        .btn-play { background: #7b1fa2; }
        .btn-prev { background: #555; }
        .btn-next { background: #555; }
        .btn-beep { background: #d32f2f; margin-top: 10px; }

        .status { 
            margin-top: 15px; 
            font-size: 0.8rem; 
            color: #888; 
            padding: 10px;
            background: #0a0a0a;
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            text-align: left;
        }
        
        .console-line {
            font-family: monospace;
            font-size: 0.75rem;
            margin: 2px 0;
            word-break: break-all;
        }
        
        .console-error { color: #ff6b6b; }
        .console-warn  { color: #ffa500; }
        .console-log   { color: #51cf66; }
        .loading       { color: #888; font-style: italic; }

        .tempo-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid #333;
        }
        .tempo-row label { font-size: 0.8rem; color: #888; white-space: nowrap; }
        .tempo-row input[type=range] {
            flex: 1;
            accent-color: #7b1fa2;
            height: 4px;
            cursor: pointer;
        }
        #tempo-value { font-size: 0.8rem; color: #aaa; white-space: nowrap; min-width: 48px; text-align: right; }
    </style>
</head>
<body>

    <div class="container">
        <h1>👻 Spooky Tunes</h1>
        <div id="tune-index">— / —</div>
        <div id="tune-title">Loading...</div>

        <div class="main-actions">
            <button class="btn-prev" id="btn-prev" disabled>⏮ PREV</button>
            <button class="btn-play" id="btn-start" disabled>▶ START</button>
            <button class="btn-next" id="btn-next" disabled>NEXT ⏭</button>
        </div>
        
        <button class="btn-beep" id="btn-beep" disabled>🔊 TEST BEEP</button>
        <button class="btn-beep" id="btn-note" style="background: #1976d2;" disabled>🎵 TEST NOTES</button>

        <div class="tempo-row">
            <label>TEMPO</label>
            <input type="range" id="tempo-slider" min="50" max="200" value="100" step="5">
            <span id="tempo-value">100%</span>
        </div>

        <div class="status" id="status-text">
            <div class="console-line loading">Initializing music system...</div>
            <div class="console-line console-warn">Open browser DevTools (F12) for full logs</div>
        </div>
    </div>

<script type="module">
    // ── Key insight: TradSessionPlayer reads directly from its own imported
    // allTunes object. We can't patch the player instance. Instead we import
    // allTunes here too (same module instance, shared by JS module cache) and
    // mutate it — those mutations are visible to the player's loadTune().
    import { allTunes }          from './js/game/systems/music/allTunes.js';
    import { gameSpookyTunes }   from './js/game/systems/music/gameSpookyTunes.js';

    // Inject spooky tunes into the shared allTunes object.
    // Because ES modules are singletons, this is the same object the player holds.
    Object.assign(allTunes, gameSpookyTunes);

    // ── Tempo scaling ─────────────────────────────────────────────────────────
    // TradSessionPlayer imports its own abcjs instance — we can't patch it from
    // outside. The only clean hook is TEMPO_SETTINGS, which the player reads at
    // loadTune() time. We need it exported from the player module.
    // Import it here (requires the one-line change to tradSessionPlayerScheduled.js
    // noted below) and mutate its values directly — the player reads them live.
    import { TradSessionPlayer, TEMPO_SETTINGS } from './js/game/systems/music/tradSessionPlayerScheduled.js';

    // Keep original values so we can scale from them, not compound-scale
    const TEMPO_DEFAULTS = { ...TEMPO_SETTINGS };

    let tempoScale = 1.0;

    function applyTempoScale(scale) {
        for (const key of Object.keys(TEMPO_DEFAULTS)) {
            TEMPO_SETTINGS[key] = Math.round(TEMPO_DEFAULTS[key] / scale);
        }
    }

    console.log('[Main] Script loaded, initializing...');

    let session    = null;
    let tuneKeys   = [];
    let currentIdx = 0;
    let isBusy     = false;

    // ── Console mirror ────────────────────────────────────────────────────────
    const statusEl = document.getElementById('status-text');
    const _log   = console.log;
    const _error = console.error;
    const _warn  = console.warn;

    function addToConsole(msg, type = 'log') {
        const line = document.createElement('div');
        line.className = `console-line console-${type}`;
        line.textContent = typeof msg === 'object' ? JSON.stringify(msg) : String(msg);
        statusEl.appendChild(line);
        statusEl.scrollTop = statusEl.scrollHeight;
        while (statusEl.children.length > 50) statusEl.removeChild(statusEl.firstChild);
    }

    console.log   = (...a) => { _log.apply(console, a);   addToConsole(a.join(' '), 'log');   };
    console.error = (...a) => { _error.apply(console, a); addToConsole(a.join(' '), 'error'); };
    console.warn  = (...a) => { _warn.apply(console, a);  addToConsole(a.join(' '), 'warn');  };

    // ── Init ──────────────────────────────────────────────────────────────────
    try {
        session  = new TradSessionPlayer();
        // Only show spooky keys in the browser, even though allTunes now has both
        tuneKeys = Object.keys(gameSpookyTunes);

        console.log('[Main] Spooky tunes injected and available:', tuneKeys.length);

        document.getElementById('btn-start').disabled = false;
        document.getElementById('btn-prev').disabled  = false;
        document.getElementById('btn-next').disabled  = false;
        document.getElementById('btn-beep').disabled  = false;
        document.getElementById('btn-note').disabled  = false;

        updateTitle();
        console.log('[Main] System initialized successfully');

    } catch (error) {
        console.error('[Main] Initialization error:', error);
        console.error('[Main] Error stack:', error.stack);
        document.getElementById('tune-title').textContent = 'Error - Check console';
    }

    // ── UI helpers ────────────────────────────────────────────────────────────
    function updateTitle() {
        const key = tuneKeys[currentIdx] || '—';
        document.getElementById('tune-index').textContent =
            `${currentIdx + 1} / ${tuneKeys.length}`;
        document.getElementById('tune-title').textContent =
            key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    }

    // ── Core play helper ──────────────────────────────────────────────────────
    async function playTune(key) {
        if (isBusy) {
            console.warn('[UI] Still busy — ignoring request');
            return;
        }
        isBusy = true;

        try {
            if (typeof session.stop === 'function') {
                await session.stop();
            }

            updateTitle();
            console.log('[UI] Loading tune:', key);

            const loaded = await session.loadTune(key);
            if (!loaded) {
                console.error('[UI] Failed to load tune:', key);
                // Auto-skip to next rather than stalling
                isBusy = false;
                currentIdx = (currentIdx + 1) % tuneKeys.length;
                playTune(tuneKeys[currentIdx]);
                return;
            }

            session.loop    = false;
            session.onEnded = () => {
                console.log('[UI] Track ended — auto-advancing');
                currentIdx = (currentIdx + 1) % tuneKeys.length;
                playTune(tuneKeys[currentIdx]);
            };

            console.log('[UI] Calling play()...');
            await session.play();
            console.log('[UI] Playback started. AudioContext state:', session.audioContext?.state);

            // Unmute banjo (track 2) straight away — harp leads, banjo accompanies.
            // Piano (track 1) stays muted; too muddy for audition purposes.
            if (session.tracks[2]) {
                session.engine.applyFade(session.tracks[2].gain, session.tracks[2].gain.targetVolume || 0.7, 0.8);
                session.tracks[2].active = true;
                console.log('[UI] Banjo unmuted');
            }

        } catch (err) {
            console.error('[UI] playTune error:', err);
            console.error('[UI] Error stack:', err.stack);
        } finally {
            isBusy = false;
        }
    }

    // ── Button handlers ───────────────────────────────────────────────────────
    document.getElementById('btn-prev').addEventListener('click', () => {
        currentIdx = (currentIdx - 1 + tuneKeys.length) % tuneKeys.length;
        playTune(tuneKeys[currentIdx]);
    });

    document.getElementById('btn-start').addEventListener('click', () => {
        playTune(tuneKeys[currentIdx]);
    });

    document.getElementById('btn-next').addEventListener('click', () => {
        currentIdx = (currentIdx + 1) % tuneKeys.length;
        playTune(tuneKeys[currentIdx]);
    });

    document.getElementById('btn-beep').addEventListener('click', () => {
        console.log('[UI] Test beep clicked');
        session.engine.testBeep();
    });

    document.getElementById('btn-note').addEventListener('click', () => {
        console.log('[UI] Test note clicked');
        session.testSimpleNote();
    });

    // ── Tempo slider ──────────────────────────────────────────────────────────
    const tempoSlider = document.getElementById('tempo-slider');
    const tempoLabel  = document.getElementById('tempo-value');

    tempoSlider.addEventListener('input', () => {
        tempoScale = parseInt(tempoSlider.value) / 100;
        tempoLabel.textContent = `${tempoSlider.value}%`;
    });

    // On release: scale TEMPO_SETTINGS in place, then reload+play current tune.
    // The player reads TEMPO_SETTINGS fresh on each loadTune() call.
    tempoSlider.addEventListener('change', async () => {
        tempoScale = parseInt(tempoSlider.value) / 100;
        applyTempoScale(tempoScale);
        console.log(`[Tempo] Scale: ${tempoScale} — reloading tune`);
        await playTune(tuneKeys[currentIdx]);
    });

    console.log('[Main] UI initialized and ready');
</script>

<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>

</body>
</html>
