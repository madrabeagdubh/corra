<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fenian Viewer - Forced Grid</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #0d0f0e; overflow: hidden; }
        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; 
            background: rgba(13, 16, 15, 0.9); color: #c8922a; 
            font-family: monospace; padding: 12px; text-align: center;
            z-index: 10; pointer-events: none; font-size: 13px;
            border-bottom: 1px solid #2a3028;
        }
    </style>
</head>
<body>

    <div id="overlay">Initializing Forced Sync...</div>

    <script>
        const TILE_SIZE = 24;
        const MARGIN = 24;  
        const SPACING = 0;
        const GROUND_ID = 732; 

        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            pixelArt: true,
            scene: { preload, create, update }
        };

        const game = new Phaser.Game(config);
        const info = document.getElementById('overlay');
        let cursors, keyQ, keyE, keyR, keyG, gridGraphics;

        function preload() {
            this.load.image('oryxSource', '/assets/oryx/oryx_16bit_fantasy_world_trans.png');
            this.load.json('map', '/maps/bogPath1.json');
        }

        function create() {
            const data = this.cache.json.get('map');
            const img = this.textures.get('oryxSource').getSourceImage();
            
            if (!data || !img) return;

            // --- THE EXACT CATALOGUE MATH ---
            // We calculate columns EXACTLY like your tool: 
            // (Total Width - Margin - Margin) / TileSize
            const cols = Math.floor((img.width - (MARGIN * 2)) / TILE_SIZE);
            const rows = Math.floor((img.height - (MARGIN * 2)) / TILE_SIZE);
            const totalFrames = cols * rows;

            // Create an empty texture and manually inject frames
            const tex = this.textures.createCanvas('oryxTiles', img.width, img.height);
            tex.draw(0, 0, img);

            for (let i = 0; i < totalFrames; i++) {
                const col = i % cols;
                const row = Math.floor(i / cols);
                const x = MARGIN + (col * TILE_SIZE);
                const y = MARGIN + (row * TILE_SIZE);
                
                // This manually maps GID (i+1) to the exact pixel coords
                tex.add(i, 0, x, y, TILE_SIZE, TILE_SIZE);
            }

            info.innerText = `Forced Sync: ${cols} Columns | GID 732 Calibrated`;

            // 1. UNDERLAY (732 Grass)
            for (let y = 0; y < data.height; y++) {
                for (let x = 0; x < data.width; x++) {
                    this.add.image(x * TILE_SIZE, y * TILE_SIZE, 'oryxTiles', GROUND_ID - 1).setOrigin(0);
                }
            }

            // 2. MAP LAYERS
            data.layers.forEach((layer) => {
                layer.forEach((row, y) => {
                    row.forEach((tileID, x) => {
                        if (tileID > 0) {
                            const tile = this.add.image(x * TILE_SIZE, y * TILE_SIZE, 'oryxTiles', tileID - 1).setOrigin(0);
                            tile.setInteractive();
                            tile.on('pointerdown', () => {
                                info.innerText = `GID: ${tileID} | Col/Row: ${Math.floor((tileID-1)%cols)}/${Math.floor((tileID-1)/cols)}`;
                            });
                        }
                    });
                });
            });

            gridGraphics = this.add.graphics();
            drawGrid(data.width, data.height);

            cursors = this.input.keyboard.createCursorKeys();
            keyQ = this.input.keyboard.addKey('Q');
            keyE = this.input.keyboard.addKey('E');
            keyR = this.input.keyboard.addKey('R');
            keyG = this.input.keyboard.addKey('G');

            this.cameras.main.setBounds(0, 0, data.width * TILE_SIZE, data.height * TILE_SIZE);
            this.cameras.main.setZoom(2);
            this.cameras.main.centerOn(data.width * TILE_SIZE / 2, data.height * TILE_SIZE / 2);

            this.input.on('pointermove', (p) => {
                if (!p.isDown) return;
                this.cameras.main.scrollX -= (p.x - p.prevPosition.x) / this.cameras.main.zoom;
                this.cameras.main.scrollY -= (p.y - p.prevPosition.y) / this.cameras.main.zoom;
            });
        }

        function drawGrid(w, h) {
            gridGraphics.clear();
            gridGraphics.lineStyle(1, 0xc8922a, 0.2);
            for (let i = 0; i <= w; i++) {
                gridGraphics.moveTo(i * TILE_SIZE, 0);
                gridGraphics.lineTo(i * TILE_SIZE, h * TILE_SIZE);
            }
            for (let j = 0; j <= h; j++) {
                gridGraphics.moveTo(0, j * TILE_SIZE);
                gridGraphics.lineTo(w * TILE_SIZE, j * TILE_SIZE);
            }
            gridGraphics.strokePath();
        }

        function update() {
            const cam = this.cameras.main;
            const speed = 10;
            if (cursors.left.isDown) cam.scrollX -= speed;
            if (cursors.right.isDown) cam.scrollX += speed;
            if (cursors.up.isDown) cam.scrollY -= speed;
            if (cursors.down.isDown) cam.scrollY += speed;
            if (keyQ.isDown) cam.zoom -= 0.05;
            if (keyE.isDown) cam.zoom += 0.05;
            if (keyR.isDown) { cam.setZoom(2); cam.centerOn(240, 240); }
            if (Phaser.Input.Keyboard.JustDown(keyG)) gridGraphics.setVisible(!gridGraphics.visible);
        }

        window.addEventListener('resize', () => game.scale.resize(window.innerWidth, window.innerHeight));
    </script>
</body>
</html>
