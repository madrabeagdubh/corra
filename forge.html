<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ding Dong Dederó</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=IM+Fell+English:ital@0;1&display=swap');
:root{--coal:#0c0a07;--ember:#c44d12;--gold:#d4a847;--iron:#3a3830;--steel:#8a9090;--glow:#ff7b2e;--mist:#6a8878;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--coal);color:var(--steel);font-family:'IM Fell English',Georgia,serif;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2rem;padding:2rem;overflow:hidden;}
h1{font-family:'UnifrakturMaguntia',serif;font-size:clamp(2rem,6vw,3.8rem);
  color:var(--gold);letter-spacing:.05em;text-align:center;
  text-shadow:0 0 50px rgba(196,77,18,.4),0 0 100px rgba(196,77,18,.12);}
.sub{font-style:italic;color:var(--mist);font-size:.85rem;letter-spacing:.14em;
  text-align:center;margin-top:-.8rem;}
#phase{font-size:.95rem;color:#3a3830;letter-spacing:.08em;
  min-height:1.3rem;text-align:center;transition:color 1.4s;font-style:italic;}
#phase.warm{color:#7a6540;}
#phase.lit {color:var(--glow);}
#phase.full{color:var(--gold);font-style:normal;font-size:1.15rem;
  text-shadow:0 0 24px rgba(212,168,71,.35);}
button{background:transparent;border:1px solid #3a2a18;color:#5a4020;
  padding:.7rem 2.5rem;border-radius:2px;cursor:pointer;
  font-family:'IM Fell English',serif;font-size:1rem;letter-spacing:.08em;
  transition:all .3s;}
button:hover{border-color:var(--ember);color:var(--ember);
  box-shadow:0 0 16px rgba(196,77,18,.12);}
button:disabled{opacity:.2;cursor:default;}
</style>
</head>
<body>
<h1>Ding Dong Dederó</h1>
<p class="sub">An Gabha · Beo agus Beathach</p>
<p id="phase">—</p>
<button id="btn">▶ Cluas le héisteacht</button>

<script>
// ═══════════════════════════════════════════════════════════════════════
//  DING DONG DEDERÓ  —  Pure Web Audio, full village build-up
//
//  Every sound is synthesised. No samples. No ABCJS.
//
//  Structure:
//    0:00  Workshop only — fire, bellows, random hammering
//    0:22  Pulse begins — heavy hammer on the 2 main beats
//    0:44  Sparse melody — bell tone, just the skeleton
//    1:08  Full melody — every note, bell quality
//    1:32  Harmony — third below joins
//    1:56  Bass + bodhrán — it swings now
//    2:20  Voice pad — warm choir underneath
//    2:44  Fiddle line — sawtooth solo on B-part
//    3:08  All together — wild, ornamented, celebratory
//    loops
// ═══════════════════════════════════════════════════════════════════════

// ── Frequencies ──────────────────────────────────────────────────────────
const HZ = {
  D2:73.42, A2:110.00, D3:146.83, A3:220.00,
  D4:293.66, E4:329.63, F4:349.23, G4:392.00,
  A4:440.00, B4:493.88, C5:523.25, D5:587.33,
  E5:659.26, F5:698.46, G5:783.99, A5:880.00,
};

// D Dorian third-below map
const THIRD_BELOW = {
  D5:'B4', C5:'A4', B4:'G4', A4:'F4', G4:'E4',
  F4:'D4', E5:'C5', F5:'D5', G5:'E5', A5:'F5',
};

// ── Tune definition (D Dorian, 4/4, L=1/8, Q=136) ────────────────────────
// Each entry: [noteKey, eighthNoteCount]
// null = rest

const EIGHTH = 60/136/2;   // seconds per eighth note
const BAR    = EIGHTH * 8; // 8 eighth notes per bar

const A1 = [                // bars 1-4
  ['D5',2],['A4',2],['B4',1],['G4',1],['G4',2],   // d2 A2 BG G2
  ['A4',2],['A4',2],['C5',2],['D5',2],              // A2 A2 c2 d2
  ['D5',2],['A4',2],['B4',1],['G4',1],['A4',1],['F4',1], // d2 A2 BG AF
  ['G4',2],['F4',2],['G4',2],['A4',2],              // G2 F2 G2 A2
];
const A2 = [                // bars 5-8 (slight variation)
  ['D5',2],['A4',2],['B4',1],['G4',1],['G4',2],
  ['A4',2],['A4',2],['C5',2],['D5',2],
  ['D5',1],['D5',1],['A4',2],['B4',1],['G4',1],['A4',1],['F4',1], // dd A2 BG AF
  ['G4',2],['F4',2],['G4',4],                        // G2 F2 G4
];
const B1 = [                // bars 9-12
  ['A4',2],['A4',2],['B4',2],['A4',1],['G4',1],    // A2 A2 B2 AG
  ['A4',2],['A4',2],['F5',2],['E5',1],['F5',1],     // A2 A2 f2 ef
  ['G5',2],['F5',2],['E5',2],['D5',1],['C5',1],     // g2 f2 e2 dc
  ['A4',2],['A4',2],['C5',2],['D5',2],              // A2 A2 c2 d2
];
const B2 = [                // bars 13-16
  ['A4',2],['A4',2],['B4',2],['A4',1],['G4',1],
  ['A4',2],['A4',2],['F5',2],['E5',1],['F5',1],
  ['G5',2],['F5',2],['E5',2],['D5',1],['C5',1],
  ['A4',2],['A4',2],['C5',2],['D5',1],['E5',1],     // ...c2 de (pickup into repeat)
];
const FULL_TUNE = [...A1,...A2,...B1,...B2];

// Ornamented version — grace note flicks on key notes
const ORNA_NOTES = new Set(['D5','G5','F5','B4']); // these get pre-flicks

// ── Time-stamp a melody array ─────────────────────────────────────────────
// Returns [{freq, t, dur, isStressed}]
function stamp(melody, t0, swing=0) {
  const out=[]; let t=t0;
  melody.forEach(([n,e],idx)=>{
    const dur = e * EIGHTH * (1 + (idx%2===0 ? swing : -swing*0.6));
    out.push({freq: HZ[n], t, dur, name:n,
      isStressed: e>=2 && (n==='D5'||n==='A4')});
    t += dur;
  });
  return out;
}

// ── State ─────────────────────────────────────────────────────────────────
let ac, masterG, reverbNode, reverbWetG;
let workshopNode=null;
let playing=false;
let passIdx=0;
let passTimer=null;
let TUNE_DUR = 0;

function setPhase(msg,cls){
  const el=document.getElementById('phase');
  el.textContent=msg; el.className=cls||'';
}

// ── Boot audio ────────────────────────────────────────────────────────────
function boot(){
  if(ac) return;
  ac = new (window.AudioContext||window.webkitAudioContext)();
  masterG = ac.createGain(); masterG.gain.value=0.80;
  masterG.connect(ac.destination);
  // Warm stone-room reverb
  const rLen=Math.floor(ac.sampleRate*2.0);
  const imp=ac.createBuffer(2,rLen,ac.sampleRate);
  for(let ch=0;ch<2;ch++){
    const d=imp.getChannelData(ch);
    for(let i=0;i<rLen;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/rLen,1.65);
  }
  reverbNode=ac.createConvolver(); reverbNode.buffer=imp;
  reverbWetG=ac.createGain(); reverbWetG.gain.value=0.22;
  reverbNode.connect(reverbWetG); reverbWetG.connect(masterG);

  // Compute tune duration from stamp
  const ev=stamp(FULL_TUNE,0,0);
  TUNE_DUR = ev[ev.length-1].t + ev[ev.length-1].dur + 0.2;
}

// ── Core synth voices ─────────────────────────────────────────────────────

// Bell/hammer — inharmonic ring, same synthesis that sounded great
function bell(t, freq, vel, ring, gainNode, brightBoost=1){
  // Crack
  const nLen=Math.ceil(ac.sampleRate*.026);
  const nBuf=ac.createBuffer(1,nLen,ac.sampleRate);
  const nd=nBuf.getChannelData(0); for(let i=0;i<nLen;i++) nd[i]=Math.random()*2-1;
  const nS=ac.createBufferSource(); nS.buffer=nBuf;
  const nBP=ac.createBiquadFilter(); nBP.type='bandpass';
  nBP.frequency.value=2200*brightBoost; nBP.Q.value=1.7;
  const nG=ac.createGain();
  nG.gain.setValueAtTime(vel*.68,t); nG.gain.exponentialRampToValueAtTime(.001,t+.018);
  nS.connect(nBP); nBP.connect(nG); nG.connect(gainNode); nG.connect(reverbNode);
  nS.start(t); nS.stop(t+.028);
  // Ring partials
  [{r:1.000,a:1.00},{r:2.756,a:0.55},{r:5.404,a:0.18},{r:1.003,a:0.58}].forEach(p=>{
    const osc=ac.createOscillator(); const g=ac.createGain();
    osc.type='sine';
    osc.frequency.setValueAtTime(freq*p.r*1.005,t);
    osc.frequency.exponentialRampToValueAtTime(freq*p.r,t+.04);
    const pk=vel*.72*p.a;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(pk,t+.003);
    g.gain.exponentialRampToValueAtTime(pk*.38,t+.10);
    g.gain.exponentialRampToValueAtTime(.0001,t+ring);
    const lp=ac.createBiquadFilter(); lp.type='lowpass';
    lp.frequency.value=7000*brightBoost;
    osc.connect(lp); lp.connect(g); g.connect(gainNode); g.connect(reverbNode);
    osc.start(t); osc.stop(t+ring+.05);
  });
  // Thud (less for high notes)
  const thudAmt=Math.max(.05,.5-freq/2000);
  const to=ac.createOscillator(); const tg=ac.createGain(); to.type='sine';
  to.frequency.setValueAtTime(freq*.22,t);
  to.frequency.exponentialRampToValueAtTime(freq*.06,t+.09);
  tg.gain.setValueAtTime(vel*thudAmt,t);
  tg.gain.exponentialRampToValueAtTime(.0001,t+.12);
  to.connect(tg); tg.connect(gainNode); to.start(t); to.stop(t+.15);
}

// Voice — warm formant "oo", detuned unison
function voice(t, freq, dur, vel, gainNode){
  const atk=Math.min(.10,dur*.18), rel=Math.min(.15,dur*.22);
  [0,-.007,+.009].forEach((det,i)=>{
    const saw=ac.createOscillator(); saw.type='sawtooth';
    saw.frequency.value=freq*(1+det);
    // vibrato after attack
    const vlfo=ac.createOscillator(); const vg=ac.createGain();
    vlfo.frequency.value=5.2;
    vg.gain.setValueAtTime(0,t); vg.gain.setValueAtTime(0,t+atk+.06);
    vg.gain.linearRampToValueAtTime(freq*.009,t+atk+.18);
    vlfo.connect(vg); vg.connect(saw.frequency);
    // formant — oo vowel
    const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=1600;
    const f1=ac.createBiquadFilter(); f1.type='peaking'; f1.frequency.value=320; f1.Q.value=4; f1.gain.value=11;
    const f2=ac.createBiquadFilter(); f2.type='peaking'; f2.frequency.value=840; f2.Q.value=5; f2.gain.value=8;
    const env=ac.createGain();
    const pk=vel*.12*(1-i*.04);
    env.gain.setValueAtTime(0,t);
    env.gain.linearRampToValueAtTime(pk,t+atk);
    env.gain.setValueAtTime(pk,t+dur-rel);
    env.gain.linearRampToValueAtTime(.0001,t+dur);
    saw.connect(lp); lp.connect(f1); f1.connect(f2); f2.connect(env);
    env.connect(gainNode); env.connect(reverbNode);
    saw.start(t); saw.stop(t+dur+.06);
    vlfo.start(t); vlfo.stop(t+dur+.06);
  });
}

// Fiddle — sawtooth, faster vibrato, bright filter
function fiddle(t, freq, dur, vel, gainNode){
  const atk=Math.min(.04,dur*.12), rel=Math.min(.08,dur*.18);
  const saw=ac.createOscillator(); saw.type='sawtooth';
  saw.frequency.value=freq;
  // vibrato starts fast — Irish fiddle feel
  const vlfo=ac.createOscillator(); const vg=ac.createGain();
  vlfo.frequency.value=6.5;
  vg.gain.setValueAtTime(0,t); vg.gain.setValueAtTime(0,t+atk+.025);
  vg.gain.linearRampToValueAtTime(freq*.012,t+atk+.08);
  vlfo.connect(vg); vg.connect(saw.frequency);
  // bright LP
  const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=3200;
  const hp=ac.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=120;
  const env=ac.createGain();
  env.gain.setValueAtTime(0,t);
  env.gain.linearRampToValueAtTime(vel*.28,t+atk);
  env.gain.setValueAtTime(vel*.28,t+dur-rel);
  env.gain.exponentialRampToValueAtTime(.0001,t+dur);
  saw.connect(lp); lp.connect(hp); hp.connect(env);
  env.connect(gainNode); env.connect(reverbNode);
  saw.start(t); saw.stop(t+dur+.04);
  vlfo.start(t); vlfo.stop(t+dur+.04);
}

// Bodhrán hit
function bodhran(t, vel, gainNode){
  const o=ac.createOscillator(); const g=ac.createGain(); o.type='sine';
  o.frequency.setValueAtTime(195,t); o.frequency.exponentialRampToValueAtTime(66,t+.10);
  g.gain.setValueAtTime(vel*.72,t); g.gain.exponentialRampToValueAtTime(.0001,t+.17);
  o.connect(g); g.connect(gainNode); o.start(t); o.stop(t+.22);
  const nLen=Math.ceil(ac.sampleRate*.055), nBuf=ac.createBuffer(1,nLen,ac.sampleRate);
  const nd=nBuf.getChannelData(0); for(let i=0;i<nLen;i++) nd[i]=Math.random()*2-1;
  const nS=ac.createBufferSource(); nS.buffer=nBuf;
  const nlp=ac.createBiquadFilter(); nlp.type='lowpass'; nlp.frequency.value=780;
  const ng=ac.createGain();
  ng.gain.setValueAtTime(vel*.22,t); ng.gain.exponentialRampToValueAtTime(.0001,t+.046);
  nS.connect(nlp); nlp.connect(ng); ng.connect(gainNode);
  nS.start(t); nS.stop(t+.06);
}

// Bass note — deep warm sine
function bass(t, freq, dur, vel, gainNode){
  const o=ac.createOscillator(); const g=ac.createGain(); o.type='sine';
  // add slight second harmonic for warmth
  const o2=ac.createOscillator(); const g2=ac.createGain(); o2.type='sine';
  o.frequency.value=freq; o2.frequency.value=freq*2;
  const atk=.06;
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vel*.55,t+atk);
  g.gain.setValueAtTime(vel*.55,t+dur-.10); g.gain.exponentialRampToValueAtTime(.0001,t+dur);
  g2.gain.setValueAtTime(0,t); g2.gain.linearRampToValueAtTime(vel*.12,t+atk);
  g2.gain.setValueAtTime(vel*.12,t+dur-.10); g2.gain.exponentialRampToValueAtTime(.0001,t+dur);
  o.connect(g); g.connect(gainNode);
  o2.connect(g2); g2.connect(gainNode);
  o.start(t); o.stop(t+dur+.05);
  o2.start(t); o2.stop(t+dur+.05);
}

// Grace note — a flick just before the main note
function grace(t, freq, gainNode){
  const graceFreq = freq * 1.189; // whole step above — Irish flick
  const nS=ac.createOscillator(); const nG=ac.createGain(); nS.type='sine';
  nS.frequency.value=graceFreq;
  nG.gain.setValueAtTime(0,t-.055); nG.gain.linearRampToValueAtTime(.18,t-.040);
  nG.gain.exponentialRampToValueAtTime(.001,t-.002);
  nS.connect(nG); nG.connect(gainNode); nG.connect(reverbNode);
  nS.start(t-.055); nS.stop(t);
}

// ── Pass scheduler ────────────────────────────────────────────────────────
// Each pass through the tune can have different "layers" active.
// We pre-schedule everything using ac.currentTime + offset.

function makeGain(vol){
  const g=ac.createGain(); g.gain.value=vol;
  g.connect(masterG); return g;
}
function fadeGain(g, to, dur){
  const now=ac.currentTime;
  g.gain.cancelScheduledValues(now);
  g.gain.setValueAtTime(Math.max(.0001,g.gain.value),now);
  g.gain.linearRampToValueAtTime(Math.max(.0001,to),now+dur);
}

function schedulePass(t0, config){
  const {melody, harmony, bassOn, rhythmOn, voiceOn, fiddleOn,
         ornaments, swing, melVel, bright} = config;

  const notes = stamp(FULL_TUNE, t0, swing||0);
  const g_mel  = makeGain(melody||0);
  const g_harm = makeGain(harmony||0);
  const g_bass = makeGain(bassOn||0);
  const g_rhy  = makeGain(rhythmOn||0);
  const g_voice= makeGain(voiceOn||0);
  const g_fiddle=makeGain(fiddleOn||0);

  // fade in each layer
  if(melody>0)   { g_mel.gain.value=.0001;   fadeGain(g_mel,  melody,  1.8); }
  if(harmony>0)  { g_harm.gain.value=.0001;  fadeGain(g_harm, harmony, 2.5); }
  if(bassOn>0)   { g_bass.gain.value=.0001;  fadeGain(g_bass, bassOn,  2.2); }
  if(rhythmOn>0) { g_rhy.gain.value=.0001;   fadeGain(g_rhy,  rhythmOn,1.5); }
  if(voiceOn>0)  { g_voice.gain.value=.0001; fadeGain(g_voice,voiceOn, 3.5); }
  if(fiddleOn>0) { g_fiddle.gain.value=.0001;fadeGain(g_fiddle,fiddleOn,1.2);}

  notes.forEach((n,idx)=>{
    const {freq,t,dur,name,isStressed}=n;
    const jit=(Math.random()-.5)*.009;
    const v=(melVel||.80)*(0.90+Math.random()*.18);

    // Melody bell
    if(melody>0) bell(t+jit, freq, v, dur*1.8+.5, g_mel, bright||1);

    // Harmony (third below)
    if(harmony>0){
      const hname=THIRD_BELOW[name];
      if(hname && HZ[hname]){
        bell(t+jit, HZ[hname], v*.68, dur*1.6+.4, g_harm, (bright||1)*.85);
      }
    }

    // Voice pad — held per note
    if(voiceOn>0){
      voice(t, freq, dur*.95, v*.9, g_voice);
    }

    // Fiddle — only on B part (bars 9-16) when active
    if(fiddleOn>0 && idx >= 40){  // B part starts at roughly note index 40
      fiddle(t, freq, Math.max(dur*.88, EIGHTH*.8), v, g_fiddle);
      // ornament flicks on key notes
      if(ORNA_NOTES.has(name) && ornaments) grace(t, freq, g_fiddle);
    }

    // Grace notes on melody
    if(ornaments && melody>0 && ORNA_NOTES.has(name)){
      grace(t, freq, g_mel);
    }

    // Bass — D3 on beat 1, A3 on beat 3 of each bar
    // (handled separately below)
  });

  // Bass line — every bar
  if(bassOn>0){
    const barCount=16;
    for(let b=0;b<barCount;b++){
      const bt=t0+b*BAR;
      bass(bt,       HZ.D3, BAR*.45, .82, g_bass);
      bass(bt+BAR/2, HZ.A3, BAR*.40, .65, g_bass);
    }
  }

  // Bodhrán — boom-tah pattern
  if(rhythmOn>0){
    const barCount=16;
    for(let b=0;b<barCount;b++){
      const bt=t0+b*BAR;
      bodhran(bt,       .85, g_rhy);
      bodhran(bt+BAR*.5, .52, g_rhy);
    }
  }
}

// ── Workshop ambience ─────────────────────────────────────────────────────
function startWorkshop(){
  const out=ac.createGain(); out.gain.value=.50; out.connect(ac.destination);

  // Fire bed
  const fireSeg=()=>{
    if(!playing) return;
    const dur=3.8;
    const nBuf=ac.createBuffer(1,Math.ceil(ac.sampleRate*(dur+.3)),ac.sampleRate);
    const nd=nBuf.getChannelData(0); for(let i=0;i<nd.length;i++) nd[i]=Math.random()*2-1;
    const nS=ac.createBufferSource(); nS.buffer=nBuf;
    const bp=ac.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=165; bp.Q.value=.5;
    const g=ac.createGain(); g.gain.value=.045;
    nS.connect(bp); bp.connect(g); g.connect(out);
    nS.start(ac.currentTime); nS.stop(ac.currentTime+dur+.2);
    setTimeout(fireSeg,(dur-.2)*1000);
  };
  fireSeg();

  // Bellows
  const bellows=()=>{
    if(!playing) return;
    const now=ac.currentTime, dur=1.5+Math.random()*.5;
    const nBuf=ac.createBuffer(1,Math.ceil(ac.sampleRate*(dur+.2)),ac.sampleRate);
    const nd=nBuf.getChannelData(0); for(let i=0;i<nd.length;i++) nd[i]=Math.random()*2-1;
    const nS=ac.createBufferSource(); nS.buffer=nBuf;
    const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=245+Math.random()*60;
    const g=ac.createGain();
    g.gain.setValueAtTime(0,now); g.gain.linearRampToValueAtTime(.09,now+dur*.4);
    g.gain.linearRampToValueAtTime(.06,now+dur*.75); g.gain.exponentialRampToValueAtTime(.001,now+dur);
    nS.connect(lp); lp.connect(g); g.connect(out);
    nS.start(now); nS.stop(now+dur+.1);
    setTimeout(bellows,(dur+.6+Math.random()*.5)*1000);
  };
  setTimeout(bellows,2200);

  // Random workshop hammering — irregular, non-musical
  const WFREQS=[HZ.D4,HZ.G4,HZ.A4,HZ.D5,HZ.A3];
  const whammer=()=>{
    if(!playing) return;
    const gap=400+Math.random()*2800;
    setTimeout(()=>{
      if(!playing) return;
      const freq=WFREQS[Math.floor(Math.random()*WFREQS.length)];
      bell(ac.currentTime, freq, .42+Math.random()*.48, .8+Math.random()*.8, out, .7);
      whammer();
    }, gap);
  };
  whammer();

  // Fade workshop out as music builds
  setTimeout(()=>{
    const now=ac.currentTime;
    out.gain.cancelScheduledValues(now);
    out.gain.setValueAtTime(.50,now);
    out.gain.linearRampToValueAtTime(.14, now+18);  // slow fade over music entrance
  }, 40000);  // workshop fades starting 40s in

  return out;
}

// ── Pass configurations ────────────────────────────────────────────────────
// Each pass through the 16-bar tune:
const PASSES = [
  // 0 — sparse: only the 4 biggest beats (DING, DE, per bar)
  { melody:.55, harmony:0,   bassOn:0,   rhythmOn:0,   voiceOn:0,   fiddleOn:0,  ornaments:false, swing:0,    melVel:.72, bright:.85,
    phase:'...something in the distance...', cls:'warm',
    onlyStrong:true },

  // 1 — full melody, single voice, soft
  { melody:.70, harmony:0,   bassOn:0,   rhythmOn:0,   voiceOn:0,   fiddleOn:0,  ornaments:false, swing:0,    melVel:.78, bright:1.0,
    phase:'...a tune...', cls:'warm' },

  // 2 — melody + harmony third below
  { melody:.75, harmony:.50, bassOn:0,   rhythmOn:0,   voiceOn:0,   fiddleOn:0,  ornaments:false, swing:.04,  melVel:.80, bright:1.0,
    phase:'Ding Dong...', cls:'lit' },

  // 3 — + bass + bodhrán — it swings
  { melody:.78, harmony:.55, bassOn:.62, rhythmOn:.58, voiceOn:0,   fiddleOn:0,  ornaments:false, swing:.06,  melVel:.82, bright:1.0,
    phase:'Ding Dong Dederó!', cls:'lit' },

  // 4 — + voice pad underneath
  { melody:.78, harmony:.55, bassOn:.62, rhythmOn:.62, voiceOn:.50, fiddleOn:0,  ornaments:false, swing:.06,  melVel:.82, bright:1.0,
    phase:'Ding Dong Dederó!', cls:'lit' },

  // 5 — + fiddle solo on B-part, ornaments
  { melody:.68, harmony:.50, bassOn:.65, rhythmOn:.65, voiceOn:.48, fiddleOn:.80, ornaments:true, swing:.07,  melVel:.82, bright:1.1,
    phase:'DING DONG DEDERÓ!', cls:'full' },

  // 6+ — full, bright, ornamented, celebratory
  { melody:.82, harmony:.62, bassOn:.68, rhythmOn:.70, voiceOn:.52, fiddleOn:.82, ornaments:true, swing:.08,  melVel:.88, bright:1.15,
    phase:'DING DONG DEDERÓ!!!', cls:'full' },
];

function getPass(idx){ return PASSES[Math.min(idx, PASSES.length-1)]; }

// ── Pulse track (pre-music) ────────────────────────────────────────────────
// Two heavy beats per bar for 2 passes before the melody, to let the
// workshop rhythm establish itself.
function schedulePulse(t0, bars){
  const g=makeGain(.0001); fadeGain(g,.65,1.5);
  for(let b=0;b<bars;b++){
    const bt=t0+b*BAR;
    bell(bt,       HZ.D5, .92, 2.2, g, 1.0);  // DING
    bell(bt+BAR/2, HZ.D5, .62, 1.8, g, 1.0);  // DE
  }
  return bars*BAR;
}

// ── Main sequence ─────────────────────────────────────────────────────────
function startSequence(){
  startWorkshop();

  const WORKSHOP_ONLY = 22;  // seconds of pure workshop before anything musical
  let cursor = ac.currentTime + WORKSHOP_ONLY;

  // 4 bars of pulse before first melody pass
  setPhase('...distant hammering...','warm');
  const pulseEnd = cursor + schedulePulse(cursor, 4);
  cursor = pulseEnd;

  setTimeout(()=>setPhase('...something familiar...','warm'),
    (cursor - ac.currentTime - TUNE_DUR*0.5)*1000);

  // Schedule passes
  function schedNext(){
    if(!playing) return;
    const cfg = getPass(passIdx);
    setPhase(cfg.phase, cfg.cls);
    if(cfg.onStart) cfg.onStart();

    const t0 = cursor;

    if(cfg.onlyStrong){
      // sparse pass — only schedule strong beats
      const g=makeGain(.0001); fadeGain(g,cfg.melody,2.0);
      const bars=16;
      for(let b=0;b<bars;b++){
        const bt=t0+b*BAR;
        bell(bt,       HZ.D5, cfg.melVel, 2.2, g, cfg.bright);
        bell(bt+BAR/2, HZ.D5, cfg.melVel*.62, 1.8, g, cfg.bright);
      }
    } else {
      schedulePass(t0, cfg);
    }

    passIdx++;
    cursor = t0 + TUNE_DUR;
    passTimer = setTimeout(schedNext, (TUNE_DUR - 0.15)*1000);
  }

  passTimer = setTimeout(schedNext, (cursor - ac.currentTime - 0.10)*1000);
}

// ── Play ──────────────────────────────────────────────────────────────────
document.getElementById('btn').onclick = ()=>{
  document.getElementById('btn').disabled=true;
  document.getElementById('btn').textContent='♪';
  boot();
  if(ac.state==='suspended') ac.resume();
  playing=true;
  setPhase('stoking the fire...','warm');
  setTimeout(startSequence, 100);
};
</script>
