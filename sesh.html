<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trad Sesh Mobile</title>
    <script src="https://cdn.jsdelivr.net/npm/abcjs@6.2.2/dist/abcjs-basic-min.js"></script>
    
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --accent: #2e7d32;
            --text: #ffffff;
            --off: #333333;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 { margin: 0 0 10px 0; font-size: 1.5rem; color: var(--accent); }
        #tune-title { margin-bottom: 20px; font-weight: 300; min-height: 1.2em; }

        button {
            -webkit-appearance: none;
            border: none;
            border-radius: 12px;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            background: var(--off);
            transition: all 0.2s ease;
            touch-action: manipulation;
            cursor: pointer;
        }

        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        .main-actions {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            border-top: 1px solid #444;
            padding-top: 20px;
        }

        .btn-play { background: #1976d2; }
        .btn-prev { background: #555; }
        .btn-next { background: #555; }
        .btn-beep { background: #d32f2f; margin-top: 10px; }

        .status { 
            margin-top: 15px; 
            font-size: 0.8rem; 
            color: #888; 
            padding: 10px;
            background: #0a0a0a;
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            text-align: left;
        }
        
        .console-line {
            font-family: monospace;
            font-size: 0.75rem;
            margin: 2px 0;
            word-break: break-all;
        }
        
        .console-error { color: #ff6b6b; }
        .console-warn  { color: #ffa500; }
        .console-log   { color: #51cf66; }
        .loading       { color: #888; font-style: italic; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🍀 Trad Sesh Debugger</h1>
        <div id="tune-title">Loading...</div>

        <div class="main-actions">
            <button class="btn-prev" id="btn-prev" disabled>⏮ PREV</button>
            <button class="btn-play" id="btn-start" disabled>▶ START</button>
            <button class="btn-next" id="btn-next" disabled>NEXT ⏭</button>
        </div>
        
        <button class="btn-beep" id="btn-beep" disabled>🔊 TEST BEEP</button>
        <button class="btn-beep" id="btn-note" style="background: #7b1fa2;" disabled>🎵 TEST NOTES</button>

        <div class="status" id="status-text">
            <div class="console-line loading">Initializing music system...</div>
            <div class="console-line console-warn">Open browser DevTools (F12) for full logs</div>
        </div>
    </div>

<script type="module">
    import { TradSessionPlayer } from './js/game/systems/music/tradSessionPlayerScheduled.js';
    import { allTunes } from './js/game/systems/music/allTunes.js';

    console.log('[Main] Script loaded, initializing...');

    let session = null;
    let tuneKeys = [];
    let currentIdx = 0;
    let isBusy = false; // guard against overlapping play calls

    // ── Console mirror ────────────────────────────────────────────────────────
    const statusEl = document.getElementById('status-text');
    const _log   = console.log;
    const _error = console.error;
    const _warn  = console.warn;

    function addToConsole(msg, type = 'log') {
        const line = document.createElement('div');
        line.className = `console-line console-${type}`;
        line.textContent = typeof msg === 'object' ? JSON.stringify(msg) : String(msg);
        statusEl.appendChild(line);
        statusEl.scrollTop = statusEl.scrollHeight;
        while (statusEl.children.length > 50) statusEl.removeChild(statusEl.firstChild);
    }

    console.log   = (...a) => { _log.apply(console, a);   addToConsole(a.join(' '), 'log');   };
    console.error = (...a) => { _error.apply(console, a); addToConsole(a.join(' '), 'error'); };
    console.warn  = (...a) => { _warn.apply(console, a);  addToConsole(a.join(' '), 'warn');  };

    // ── Init ──────────────────────────────────────────────────────────────────
    try {
        session  = new TradSessionPlayer();
        tuneKeys = Object.keys(allTunes);

        console.log('[Main] Available tunes:', tuneKeys.length);
        console.log('[Main] Tune keys:', tuneKeys);

        document.getElementById('btn-start').disabled = false;
        document.getElementById('btn-prev').disabled  = false;
        document.getElementById('btn-next').disabled  = false;
        document.getElementById('btn-beep').disabled  = false;
        document.getElementById('btn-note').disabled  = false;

        document.getElementById('tune-title').textContent = 'Ready! Tap START to begin';
        console.log('[Main] System initialized successfully');

    } catch (error) {
        console.error('[Main] Initialization error:', error);
        console.error('[Main] Error stack:', error.stack);
        document.getElementById('tune-title').textContent = 'Error - Check console';
    }

    // ── Core play helper ──────────────────────────────────────────────────────
    async function playTune(key) {
        if (isBusy) {
            console.warn('[UI] Still busy — ignoring request');
            return;
        }
        isBusy = true;

        try {
            // 1. Stop whatever is currently playing and wait for it to fully release.
            if (typeof session.stop === 'function') {
                await session.stop();
            }

            // 2. Load the new tune (harp only — no instrument grid needed).
            console.log('[UI] Loading tune:', key);
            document.getElementById('tune-title').textContent = key.toUpperCase();

            const loaded = await session.loadTune(key);
            if (!loaded) {
                console.error('[UI] Failed to load tune:', key);
                return;
            }

            // 3. Single-play mode: auto-advance to next track on completion.
            session.loop    = false;
            session.onEnded = () => {
                console.log('[UI] Track ended — auto-advancing');
                currentIdx = (currentIdx + 1) % tuneKeys.length;
                playTune(tuneKeys[currentIdx]);
            };

            console.log('[UI] Calling play()...');
            await session.play();

            console.log('[UI] Playback started. AudioContext state:', session.audioContext?.state);

        } catch (err) {
            console.error('[UI] playTune error:', err);
            console.error('[UI] Error stack:', err.stack);
        } finally {
            isBusy = false;
        }
    }

    // ── Button handlers ───────────────────────────────────────────────────────
    document.getElementById('btn-prev').addEventListener('click', () => {
        currentIdx = (currentIdx - 1 + tuneKeys.length) % tuneKeys.length;
        playTune(tuneKeys[currentIdx]);
    });

    document.getElementById('btn-start').addEventListener('click', () => {
        playTune(tuneKeys[currentIdx]);
    });

    document.getElementById('btn-next').addEventListener('click', () => {
        currentIdx = (currentIdx + 1) % tuneKeys.length;
        playTune(tuneKeys[currentIdx]);
    });

    document.getElementById('btn-beep').addEventListener('click', () => {
        console.log('[UI] Test beep clicked');
        session.engine.testBeep();
    });

    document.getElementById('btn-note').addEventListener('click', () => {
        console.log('[UI] Test note clicked');
        session.testSimpleNote();
    });

    console.log('[Main] UI initialized and ready');
</script>

<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>

</body>
</html>
