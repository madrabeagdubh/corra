<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bog Generator — Fenians</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Share+Tech+Mono&display=swap');
    :root{--bg:#0d0f0e;--bg2:#13160f;--bg3:#1a1f17;--border:#2a3028;--dagda:#c8922a;--sidhe:#2d5a3d;--text:#c8c4b4;--dim:#5a5f52;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:12px;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
    #header{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;flex-shrink:0;}
    h1{font-family:'Uncial Antiqua',serif;font-size:15px;color:var(--dagda);text-shadow:0 0 10px rgba(200,146,42,0.4);letter-spacing:2px;white-space:nowrap;}
    .ctrl{display:flex;align-items:center;gap:5px;}
    .ctrl label{color:var(--dim);font-size:11px;white-space:nowrap;}
    input[type=range]{accent-color:var(--sidhe);width:64px;}
    input[type=text]{background:var(--bg3);border:1px solid var(--border);color:var(--dagda);padding:3px 6px;width:90px;font-family:'Share Tech Mono',monospace;font-size:11px;border-radius:2px;}
    select{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:3px 5px;font-family:'Share Tech Mono',monospace;font-size:11px;border-radius:2px;}
    button{background:var(--sidhe);border:none;color:#fff;padding:5px 12px;border-radius:2px;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:12px;transition:background 0.15s;}
    button:hover{background:#3d7a54;}
    button.sec{background:var(--bg3);border:1px solid var(--border);color:var(--text);}
    button.sec:hover{border-color:var(--dagda);color:var(--dagda);}
    #status{margin-left:auto;color:var(--dim);font-size:11px;}
    #main{flex:1;overflow:auto;padding:16px;}
    canvas{image-rendering:pixelated;display:block;}
    .zrow{display:flex;align-items:center;gap:5px;}
    .zrow button{width:22px;height:22px;padding:0;font-size:14px;background:var(--bg3);border:1px solid var(--border);color:var(--text);}
    #zlabel{color:var(--dim);min-width:26px;text-align:center;font-size:11px;}
  </style>
</head>
<body>
  <div id="header">
    <h1>Portach</h1>
    <div class="ctrl">
      <label>type</label>
      <select id="itype">
        <option value="0">1 — Wild Bog</option>
        <option value="1">2 — Ancient Bog</option>
        <option value="2">3 — Overgrown Ruins</option>
        <option value="3">4 — Fairy Dungeon</option>
      </select>
    </div>
    <div class="ctrl"><label>pools</label><input type="range" id="ipools" min="2" max="14" value="6"><span id="lpools">6</span></div>
    <div class="ctrl"><label>size</label><input type="range" id="isize" min="2" max="9" value="4"><span id="lsize">4</span></div>
    <div class="ctrl"><label>seed</label><input type="text" id="iseed" placeholder="random"></div>
    <button id="btn-gen">generate</button>
    <button id="btn-exp" class="sec">export</button>
    <div class="zrow">
      <button id="zm">-</button>
      <span id="zlabel">2x</span>
      <button id="zp">+</button>
    </div>
    <span id="status">ready</span>
  </div>
  <div id="main"><canvas id="c0"></canvas></div>
  <script type="module" src="js/bogPreview.js"></script>
</body>
</html>
